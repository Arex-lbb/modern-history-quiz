<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国近现代史纲要 · 单选题库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f5f0e8;
  --ink: #2c1810;
  --ink-light: #5c4a3a;
  --vermilion: #c41e3a;
  --vermilion-light: #fce8e8;
  --gold: #c9a96e;
  --gold-light: #f8f0e0;
  --jade: #3d7a5c;
  --jade-light: #e6f4ec;
  --border: #d0c8b8;
  --shadow: rgba(44,24,16,0.10);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Serif SC', 'SimSun', serif;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(201,169,110,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(196,30,58,0.03) 0%, transparent 60%),
    linear-gradient(180deg, #f7f3ea 0%, #efe5d5 50%, #f5f0e8 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--ink);
  line-height: 1.8;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 20px 18px 60px;
  position: relative;
  z-index: 1;
}

.header {
  text-align: center;
  padding: 36px 0 28px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 28px;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 50px;
  height: 5px;
  background: var(--vermilion);
  border-radius: 2px;
}

.header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}

.header .sub {
  font-size: 0.85rem;
  color: var(--ink-light);
  font-family: 'Noto Sans SC', sans-serif;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 24px;
}

.btn {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.85rem;
  padding: 8px 20px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--paper);
  color: var(--ink);
}

.btn:hover { border-color: var(--vermilion); color: var(--vermilion); }
.btn.active { background: var(--vermilion); color: #fff; border-color: var(--vermilion); }

.stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 18px;
  background: rgba(255,255,255,0.55);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 20px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.82rem;
  color: var(--ink-light);
}

.stats strong { color: var(--ink); }
.stats .correct-count { color: var(--jade); font-weight: 700; }

.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 22px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--vermilion), #d45a4c);
  transition: width 0.35s ease;
  border-radius: 2px;
}

.card {
  background: rgba(255,255,255,0.72);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px 26px;
  margin-bottom: 16px;
  box-shadow: 0 2px 10px var(--shadow);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: var(--gold);
  transition: background 0.3s;
}

.card.answered-correct { border-color: var(--jade); }
.card.answered-correct::before { background: var(--jade); }
.card.answered-wrong { border-color: var(--vermilion); background: #fef8f8; }
.card.answered-wrong::before { background: var(--vermilion); }

.q-num {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.78rem;
  color: var(--ink-light);
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}

.q-text {
  font-size: 1.08rem;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 18px;
  line-height: 1.85;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.opt {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s;
  background: rgba(255,255,255,0.4);
  user-select: none;
}

.opt:hover { border-color: var(--gold); background: var(--gold-light); }

.opt-letter {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--ink-light);
  flex-shrink: 0;
  transition: all 0.18s;
  margin-top: 1px;
}

.opt-text { flex: 1; font-size: 0.93rem; padding-top: 2px; }

/* Revealed states */
.opt.reveal-correct {
  border-color: var(--jade) !important;
  background: var(--jade-light) !important;
}
.opt.reveal-correct .opt-letter {
  background: var(--jade);
  color: #fff;
  border-color: var(--jade);
}

.opt.reveal-wrong {
  border-color: var(--vermilion) !important;
  background: var(--vermilion-light) !important;
}
.opt.reveal-wrong .opt-letter {
  background: var(--vermilion);
  color: #fff;
  border-color: var(--vermilion);
}

.feedback {
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 0.88rem;
  line-height: 1.7;
}

.feedback.correct {
  background: var(--jade-light);
  color: var(--jade);
  border: 1px solid var(--jade);
}

.feedback.wrong {
  background: var(--vermilion-light);
  color: var(--vermilion);
  border: 1px solid var(--vermilion);
}

.feedback .ans { font-weight: 700; }

.next-btn-area {
  text-align: center;
  margin-top: 14px;
}

/* End */
.end-screen {
  text-align: center;
  padding: 50px 24px;
}

.end-screen h2 { font-size: 1.6rem; color: var(--ink); margin-bottom: 8px; }
.end-screen .big-score { font-size: 3rem; font-weight: 700; margin: 18px 0; }
.end-screen .detail {
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--ink-light);
  margin-bottom: 28px;
  line-height: 2;
}

.footer {
  text-align: center;
  padding: 36px 0 16px;
  color: var(--ink-light);
  font-size: 0.78rem;
  font-family: 'Noto Sans SC', sans-serif;
  border-top: 1px solid var(--border);
  margin-top: 36px;
}

@media (max-width: 600px) {
  .container { padding: 10px; }
  .card { padding: 18px 14px; }
  .header h1 { font-size: 1.4rem; }
  .q-text { font-size: 0.98rem; }
}

.hidden { display: none !important; }
</style>
</head>

</div>

let mode = 'all';
let qlist = [];
let idx = 0;
let correct = 0;
let wrong = 0;
// Map: question.id -> user's chosen letter
let choices = {};

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('#controls [data-mode]').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-mode=' + m + ']').classList.add('active');
  reset();
}

function reset() {
  if (mode === 'all') qlist = shuffle(ALL.map((q,i) => ({...q, _idx:i})));
  else if (mode === 'r20') qlist = shuffle(ALL.map((q,i) => ({...q, _idx:i}))).slice(0,20);
  else qlist = shuffle(ALL.map((q,i) => ({...q, _idx:i}))).slice(0,50);
  idx = 0;
  correct = 0;
  wrong = 0;
  choices = {};
  updateStats();
  render();
}

function updateStats() {
  document.getElementById('txtProgress').textContent = idx + '/' + qlist.length;
  document.getElementById('txtCorrect').textContent = correct;
  document.getElementById('txtWrong').textContent = wrong;
  const pct = qlist.length ? Math.round((correct+wrong)/qlist.length*100) : 0;
  document.getElementById('txtPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = (qlist.length ? (idx/qlist.length*100) : 0) + '%';
}

function render() {
  if (idx >= qlist.length) { showEnd(); return; }

  const q = qlist[idx];
  const chosen = choices[q.id];
  const answered = chosen !== undefined;

  let optHTML = q.options.map(o => {
    let cls = 'opt';
    if (answered) {
      if (o.letter === q.answer) cls += ' reveal-correct';
      else if (o.letter === chosen) cls += ' reveal-wrong';
    }
    return `<div class="${cls}" data-letter="${o.letter}">
      <span class="opt-letter">${o.letter}</span>
      <span class="opt-text">${o.text}</span>
    </div>`;
  }).join('');

  let fbHTML = '';
  if (answered) {
    const isRight = chosen === q.answer;
    const correctOpt = q.options.find(o => o.letter === q.answer);
    const correctText = correctOpt ? correctOpt.text : '';
    fbHTML = `<div class="feedback ${isRight ? 'correct' : 'wrong'}">
      ${isRight
        ? '✅ <strong>正确！</strong>'
        : '❌ <strong>错误</strong> — 正确答案是 <span class="ans">' + q.answer + '</span>：' + correctText
      }
    </div>`;
  }

  let cardCls = 'card';
  if (answered) cardCls += chosen === q.answer ? ' answered-correct' : ' answered-wrong';

  document.getElementById('quizArea').innerHTML = `
    <div class="${cardCls}">
      <div class="q-num">第 ${idx+1} / ${qlist.length} 题</div>
      <div class="q-text">${q.question}</div>
      <div class="options" id="optGroup">${optHTML}</div>
      ${fbHTML}
    </div>
    ${answered ? '<div class="next-btn-area"><button class="btn" id="btnNext">下一题 →</button></div>' : ''}
  `;

  // Bind click handlers
  if (!answered) {
    document.querySelectorAll('#optGroup .opt').forEach(el => {
      el.addEventListener('click', () => answer(el.dataset.letter));
    });
  } else {
    document.getElementById('btnNext').addEventListener('click', next);
    document.getElementById('btnNext').focus();
  }

  updateStats();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function answer(letter) {
  const q = qlist[idx];
  if (choices[q.id] !== undefined) return; // Already answered

  choices[q.id] = letter;
  if (letter === q.answer) correct++;
  else wrong++;

  render();
}

function next() {
  idx++;
  if (idx >= qlist.length) showEnd();
  else render();
}

function showEnd() {
  const total = qlist.length;
  const pct = total ? Math.round(correct/total*100) : 0;
  let grade, color;
  if (pct >= 90) { grade = '优秀'; color = 'var(--jade)'; }
  else if (pct >= 75) { grade = '良好'; color = 'var(--gold)'; }
  else if (pct >= 60) { grade = '及格'; color = '#c9a020'; }
  else { grade = '继续努力'; color = 'var(--vermilion)'; }

  document.getElementById('quizArea').innerHTML = `
    <div class="card end-screen">
      <div style="font-size:1.1rem;color:var(--ink-light)">练习完成</div>
      <div class="big-score" style="color:${color}">${correct} / ${total}</div>
      <div style="font-size:1.2rem;color:${color};margin-bottom:16px">${grade}</div>
      <div class="detail">
        正确率：${pct}%<br>
        ✅ 正确 ${correct} 题 &nbsp;|&nbsp; ❌ 错误 ${wrong} 题
      </div>
      <button class="btn" onclick="reset()">🔄 重新练习</button>
      <button class="btn" style="margin-left:6px" onclick="reviewWrong()">📋 错题重练</button>
    </div>`;
  updateStats();
}

function reviewWrong() {
  const wrongQs = qlist.filter(q => choices[q.id] !== undefined && choices[q.id] !== q.answer);
  if (!wrongQs.length) {
    document.getElementById('quizArea').innerHTML = `
      <div class="card end-screen">
        <div style="font-size:1.1rem;color:var(--jade)">🎉 没有错题！</div>
        <button class="btn" style="margin-top:16px" onclick="reset()">🔄 重新练习</button>
      </div>`;
    return;
  }
  qlist = shuffle(wrongQs);
  idx = 0;
  correct = 0;
  wrong = 0;
  choices = {};
  updateStats();
  render();
}

// Event listeners
document.querySelectorAll('#controls [data-mode]').forEach(b => {
  b.addEventListener('click', () => setMode(b.dataset.mode));
});
document.getElementById('btnReset').addEventListener('click', reset);

// Keyboard
document.addEventListener('keydown', e => {
  if (idx >= qlist.length) return;
  const q = qlist[idx];
  const key = e.key.toUpperCase();
  if (['A','B','C','D','E'].includes(key) && choices[q.id] === undefined) {
    if (q.options.some(o => o.letter === key)) answer(key);
  }
  if ((e.key === 'Enter' || e.key === 'ArrowRight') && choices[q.id] !== undefined) {
    next();
  }
});

reset();
</script>
