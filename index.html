<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国近现代史纲要 · 题库练习</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f5f0e8;
  --paper-dark: #e8e0d0;
  --ink: #2c1810;
  --ink-light: #5c4a3a;
  --vermilion: #c41e3a;
  --vermilion-light: #f0d0d0;
  --gold: #c9a96e;
  --gold-light: #f5ecd7;
  --jade: #5b8c5a;
  --jade-light: #e0f0e0;
  --border: #c4b8a8;
  --shadow: rgba(44,24,16,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(201,169,110,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(196,30,58,0.04) 0%, transparent 50%),
    linear-gradient(180deg, #f7f3ea 0%, #f0e8d5 50%, #f5f0e8 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--ink);
  line-height: 1.8;
}

/* Paper texture overlay */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 24px 20px 60px;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 40px 0 32px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 32px;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 6px;
  background: var(--vermilion);
  border-radius: 2px;
}

.header h1 {
  font-size: 2rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

.header .subtitle {
  font-size: 0.9rem;
  color: var(--ink-light);
  font-family: 'Noto Sans SC', sans-serif;
  letter-spacing: 0.05em;
}

/* Controls */
.controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 28px;
}

.btn {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.9rem;
  padding: 10px 24px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--paper);
  color: var(--ink);
  letter-spacing: 0.03em;
}

.btn:hover {
  border-color: var(--vermilion);
  color: var(--vermilion);
  background: #fdf8f0;
}

.btn.active {
  background: var(--vermilion);
  color: #fff;
  border-color: var(--vermilion);
}

.btn-small {
  padding: 6px 16px;
  font-size: 0.8rem;
}

/* Stats bar */
.stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: rgba(255,255,255,0.6);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 24px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.85rem;
  color: var(--ink-light);
}

.stats .score {
  font-weight: 600;
  color: var(--vermilion);
  font-size: 1rem;
}

.stats .progress {
  color: var(--ink);
}

/* Progress bar */
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 24px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--vermilion), #d4534a);
  transition: width 0.4s ease;
  border-radius: 2px;
}

/* Question card */
.card {
  background: rgba(255,255,255,0.75);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px 28px;
  margin-bottom: 20px;
  box-shadow: 0 2px 12px var(--shadow);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: var(--gold);
}

.card.correct {
  border-color: var(--jade);
  background: var(--jade-light);
}

.card.correct::before { background: var(--jade); }

.card.wrong {
  border-color: var(--vermilion);
  background: var(--vermilion-light);
}

.card.wrong::before { background: var(--vermilion); }

.question-number {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.8rem;
  color: var(--ink-light);
  margin-bottom: 8px;
  letter-spacing: 0.05em;
}

.question-text {
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 20px;
  line-height: 1.9;
}

/* Options */
.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(255,255,255,0.5);
}

.option:hover {
  border-color: var(--gold);
  background: var(--gold-light);
}

.option.selected {
  border-color: var(--vermilion);
  background: #fef0f0;
}

.option.correct-answer {
  border-color: var(--jade) !important;
  background: var(--jade-light) !important;
}

.option.wrong-answer {
  border-color: var(--vermilion) !important;
  background: var(--vermilion-light) !important;
}

.option-letter {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--ink-light);
  flex-shrink: 0;
  transition: all 0.2s;
}

.option.selected .option-letter {
  background: var(--vermilion);
  color: #fff;
  border-color: var(--vermilion);
}

.option.correct-answer .option-letter {
  background: var(--jade);
  color: #fff;
  border-color: var(--jade);
}

.option.wrong-answer .option-letter {
  background: var(--vermilion);
  color: #fff;
  border-color: var(--vermilion);
}

.option-text {
  flex: 1;
  font-size: 0.95rem;
}

/* Feedback */
.feedback {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 0.9rem;
  display: none;
}

.feedback.show {
  display: block;
}

.feedback.correct-fb {
  background: var(--jade-light);
  color: var(--jade);
  border: 1px solid var(--jade);
}

.feedback.wrong-fb {
  background: var(--vermilion-light);
  color: var(--vermilion);
  border: 1px solid var(--vermilion);
}

/* End screen */
.end-screen {
  text-align: center;
  padding: 60px 30px;
}

.end-screen h2 {
  font-size: 1.8rem;
  color: var(--ink);
  margin-bottom: 12px;
}

.end-screen .final-score {
  font-size: 3rem;
  font-weight: 700;
  color: var(--vermilion);
  margin: 20px 0;
}

.end-screen .stats-detail {
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--ink-light);
  margin-bottom: 32px;
  line-height: 2;
}

/* Hiding */
.hidden { display: none !important; }

/* Footer */
.footer {
  text-align: center;
  padding: 40px 0 20px;
  color: var(--ink-light);
  font-size: 0.8rem;
  font-family: 'Noto Sans SC', sans-serif;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

@media (max-width: 600px) {
  .container { padding: 12px; }
  .card { padding: 20px 16px; }
  .header h1 { font-size: 1.5rem; }
  .question-text { font-size: 1rem; }
}

/* Mode badge */
.mode-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 3px;
  font-size: 0.75rem;
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--gold-light);
  color: var(--gold);
  border: 1px solid var(--gold);
  margin-left: 8px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>中国近现代史纲要</h1>
    <div class="subtitle">选择题题库练习 · 共 164 题</div>
  </div>

  <div class="controls" id="controls">
    <button class="btn active" onclick="setMode('all')">全部刷题</button>

    <button class="btn" onclick="setMode('random50')">随机 50 题</button>

  </div>

  <div id="quizArea"></div>
  <div class="footer">近代史纲要选择题库 · 基于教材与真题整理</div>
</div>

    let cls = 'option';
    if (answered[q.id]) {
      if (isCorrect) cls += ' correct-answer';
      if (isSelected && !isCorrect) cls += ' wrong-answer';
    }
    return `<div class="${cls}" onclick="answerQuestion('${letter}', ${q.id})" data-letter="${letter}">
      <span class="option-letter">${letter}</span>
      <span class="option-text">${o.text}</span>
    </div>`;
  }).join('');
  
  let feedbackHTML = '';
  if (answered[q.id]) {
    const userAns = answered[q.id];
    const isCorrect = userAns === q.answer;
    const correctText = q.options.find(o => o.letter === q.answer)?.text || '';
    feedbackHTML = `<div class="feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'} show">
      ${isCorrect ? '✅ 正确！' : '❌ 错误 — 正确答案是 ' + q.answer + '. ' + correctText}
    </div>`;
  }
  
  area.innerHTML = `
    <div class="card ${answered[q.id] ? (answered[q.id] === q.answer ? 'correct' : 'wrong') : ''}">
      <div class="question-number">第 ${currentIndex + 1} / ${questions.length} 题 <span class="mode-badge">${currentMode === 'all' ? '全部' : currentMode === 'random20' ? '随机20' : '随机50'}</span></div>
      <div class="question-text">${q.question}</div>
      <div class="options">${optionsHTML}</div>
      ${feedbackHTML}
    </div>
    ${answered[q.id] ? '<div style="text-align:center;margin-top:16px"><button class="btn" onclick="nextQuestion()">下一题 →</button></div>' : ''}
  `;
  
  updateStats();
}

function answerQuestion(letter, qid) {
  if (answered[qid] !== undefined) return; // Already answered
  
  const q = questions.find(q => q.id === qid);
  answered[qid] = letter;
  
  if (letter === q.answer) {
    score++;
  } else {
    wrong++;
  }
  
  renderQuestion();
  
  // Scroll to see feedback
  setTimeout(() => {
    const feedback = document.querySelector('.feedback.show');
    if (feedback) feedback.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) {
    showEndScreen();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showEndScreen() {
  const total = questions.length;
  const pct = total > 0 ? Math.round(score / total * 100) : 0;
  let grade = '';
  let gradeColor = '';
  if (pct >= 90) { grade = '优秀'; gradeColor = 'var(--jade)'; }
  else if (pct >= 75) { grade = '良好'; gradeColor = 'var(--gold)'; }
  else if (pct >= 60) { grade = '及格'; gradeColor = '#d4a017'; }
  else { grade = '继续努力'; gradeColor = 'var(--vermilion)'; }
  
  document.getElementById('quizArea').innerHTML = `
    <div class="card end-screen">
      <div style="font-size:1.2rem;color:var(--ink-light);margin-bottom:8px">练习完成</div>
      <div class="final-score" style="color:${gradeColor}">${score} / ${total}</div>
      <div style="font-size:1.3rem;color:${gradeColor};margin-bottom:20px">${grade}</div>
      <div class="stats-detail">
        正确率：${pct}%<br>
        正确：${score} 题 &nbsp;|&nbsp; 错误：${wrong} 题<br>
        未答：${total - score - wrong} 题
      </div>
      <button class="btn" onclick="resetQuiz()">🔄 重新练习</button>
      <button class="btn" style="margin-left:8px" onclick="reviewWrong()">📋 查看错题</button>
    </div>
  `;
  updateStats();
}

function reviewWrong() {
  // Filter questions answered wrong
  const wrongQs = questions.filter(q => answered[q.id] !== undefined && answered[q.id] !== q.answer);
  if (wrongQs.length === 0) {
    document.getElementById('quizArea').innerHTML = `
      <div class="card end-screen">
        <div style="font-size:1.2rem;color:var(--jade);margin-bottom:12px">🎉 没有错题！</div>
        <button class="btn" onclick="resetQuiz()">🔄 重新练习</button>
      </div>`;
    return;
  }
  questions = shuffle(wrongQs);
  currentIndex = 0;
  score = 0;
  wrong = 0;
  answered = {};
  updateStats();
  renderQuestion();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (currentIndex >= questions.length) return;
  const q = questions[currentIndex];
  const key = e.key.toUpperCase();
  if (['A','B','C','D','E'].includes(key) && answered[q.id] === undefined) {
    // Check if this option exists
    if (q.options.some(o => o.letter === key)) {
      answerQuestion(key, q.id);
    }
  }
  if (e.key === 'Enter' || e.key === 'ArrowRight') {
    if (answered[q.id] !== undefined) {
      nextQuestion();
    }
  }
});

// Start
resetQuiz();
</script>
</body>
</html>
